  <meta property="og:title" content="English Word Trainer" />
  <meta property="og:url" content="https://linkevery2s.github.io/englishword/" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://linkevery2s.github.io/englishword/ogp.jpg" />
  <meta name="description" content="Let's practice English Word." />
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="English Word Trainer" />
  <meta name="twitter:image" content="https://linkevery2s.github.io/englishword/ogp.jpg" />

  <meta name="keywords" content="English, word, vocabulary" />
  <link rel="apple-touch-icon" href="./images/apple-touch-icon.png">
  <link rel="icon" href="./images/apple-touch-icon.png">

  <link rel="manifest" href="./manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js').then(function () {
        console.log('Service Worker Registered');
      });

</head>

<body class="bg-gray-100">

  <div class="max-w-3xl mx-auto p-6">

    <h1 class="text-2xl font-bold mb-6">
      English Word Trainer
    </h1>

    <!-- 問題カード -->

    <div class="bg-white p-6 rounded-xl shadow">

      <h2 class="text-sm text-gray-500 mb-1">Word</h2>

      <p id="word" class="text-3xl font-bold mb-4"></p>

      <button id="speakWord" class="bg-gray-800 text-white px-4 py-2 rounded mb-4">
        🔊 単語音声
      </button>

    </div>

    <!-- 答え -->

    <details class="bg-white p-6 rounded-xl shadow mt-4">

      <summary class="cursor-pointer text-blue-600 text-lg">
        答えを見る
      </summary>

      <div class="mt-4">

        <p class="text-gray-500 text-sm">Meaning</p>
        <p id="meaning" class="text-xl mb-4"></p>

        <img id="image" class="rounded-lg max-h-72 mb-2 object-contain hidden">

        <button id="googleImage" class="bg-blue-600 text-white px-3 py-1 rounded mb-5">
          🖼 Google Images
        </button>

        <p class="text-gray-500 text-sm">Example</p>
        <p id="example" class="mb-2"></p>

        <button id="speakExample" class="bg-gray-700 text-white px-3 py-1 rounded mb-5">
          🔊 例文音声
        </button>

        <p class="text-gray-500 text-sm">Example Meaning</p>
        <p id="exampleMeaning" class="mb-5"></p>

        <p class="text-gray-500 text-sm">YouGlish Link</p>
        <button id="youglish" class="bg-red-600 text-white px-4 py-2 rounded mt-2 mb-5 ml-2">
          ▶ YouGlish
        </button>

        <p class="text-gray-500 text-sm">Synonym</p>
        <p id="synonym"></p>

      </div>

    </details>

    <!-- 操作 -->

    <div class="flex gap-4 mt-6">

      <button id="know" class="flex-1 bg-green-500 text-white p-3 rounded-lg">
        覚えた
      </button>

      <button id="dontknow" class="flex-1 bg-red-500 text-white p-3 rounded-lg">
        まだ
      </button>

    </div>

    <div class="flex gap-4 mt-3">

      <button id="next" class="flex-1 bg-blue-600 text-white p-3 rounded-lg">
        次の単語
      </button>

      <button id="review" class="flex-1 bg-purple-600 text-white p-3 rounded-lg">
        復習モード
      </button>

    </div>

    <!-- 学習状況 -->

    <div class="bg-white p-6 rounded-xl shadow mt-6">

      <h2 class="font-bold mb-3">学習状況</h2>

      <div class="grid grid-cols-3 text-center">

        <div>
          <p class="text-gray-500 text-sm">回答数</p>
          <p id="total" class="text-2xl font-bold">0</p>
        </div>

        <div>
          <p class="text-gray-500 text-sm">正答数</p>
          <p id="correct" class="text-2xl font-bold">0</p>
        </div>

        <div>
          <p class="text-gray-500 text-sm">正答率</p>
          <p id="rate" class="text-2xl font-bold">0%</p>
        </div>

      </div>

    </div>
    
    <!-- Listening Training -->

<div class="bg-white p-6 rounded-xl shadow mt-6">

<h2 class="font-bold mb-4">Listening Training</h2>

<div class="overflow-x-auto overflow-y-auto max-h-80 border">

<table class="min-w-full text-sm">

<thead class="bg-gray-200 sticky top-0">

<tr>

<th class="p-2 text-left">Chunk</th>
<th class="p-2">YouGlish</th>
<th class="p-2 text-left">Sentence</th>
<th class="p-2">Audio</th>

</tr>

</thead>

<tbody id="listeningTable">

</tbody>

</table>

</div>

</div>
    
    

  </div>

  <script>

    let words = []
    let reviewList = []
    let index = 0

    let total = 0
    let correct = 0

    async function loadCSV() {

      const res = await fetch("data.csv")
      const text = await res.text()

      words = parseCSV(text)

      shuffleArray(words)   // ←追加

      loadStats()
      loadReview()

      showWord()
      
      loadListeningCSV()

    }
    
    async function loadListeningCSV(){

const res = await fetch("listening.csv")
const text = await res.text()

const lines = text.trim().split("\n")

lines.shift()

const table = document.getElementById("listeningTable")

lines.forEach(line => {

const parts = line.split(",")

const chunk = parts[0]
const sentence = parts[1]

const row = document.createElement("tr")

row.className="border-t"

row.innerHTML = `

<td class="p-2 whitespace-nowrap">${chunk}</td>

<td class="p-2 text-center">
<button class="bg-red-500 text-white px-2 py-1 rounded">
▶
</button>
</td>

<td class="p-2 whitespace-nowrap">${sentence}</td>

<td class="p-2 text-center">
<button class="bg-gray-700 text-white px-2 py-1 rounded">
🔊
</button>
</td>

`

table.appendChild(row)

const buttons = row.querySelectorAll("button")

buttons[0].onclick = () => {

const url =
"https://youglish.com/pronounce/" +
encodeURIComponent(chunk) +
"/english"

window.open(url,"_blank")

}

buttons[1].onclick = () => {

speak(sentence)

}

})

}
    

    function shuffleArray(array) {

      for (let i = array.length - 1; i > 0; i--) {

        const j = Math.floor(Math.random() * (i + 1))

        const temp = array[i]
        array[i] = array[j]
        array[j] = temp

      }

    }


    function parseCSV(text) {

      const lines = text.trim().split("\n")
      const result = []

      lines.shift()

      lines.forEach(line => {

        line = line.replace(/^"|"$/g, "")

        const parts = line.split('","')

        result.push({

          word: parts[0].replace(/""/g, '"'),
          meaning: parts[1],
          example: parts[2],
          exampleMeaning: parts[3],
          synonym: parts[4]

        })

      })

      return result

    }

    function showWord() {

      const w = words[index]

      document.getElementById("word").textContent = w.word
      document.getElementById("meaning").textContent = w.meaning
      document.getElementById("example").textContent = w.example
      document.getElementById("exampleMeaning").textContent = w.exampleMeaning
      document.getElementById("synonym").textContent = w.synonym

      const img = document.getElementById("image")

      img.src = "images/" + w.word + ".png"

      img.onerror = () => {
        img.removeAttribute("src")
        img.classList.add("hidden")
      }

      img.classList.remove("hidden")

      document.querySelector("details").open = false

      document.getElementById("youglish").onclick = () => {

        const word = words[index].word

        const url = "https://youglish.com/pronounce/"
          + encodeURIComponent(word)
          + "/english"

        window.open(url, "_blank")

      }

      document.getElementById("googleImage").onclick = () => {

        const word = words[index].word

        const url =
          "https://www.google.com/search?tbm=isch&q=" +
          encodeURIComponent(word)

        window.open(url, "_blank")

      }

    }


    function nextWord() {

      index++

      if (index >= words.length) {
        index = 0
      }

      showWord()

    }

    document.getElementById("next").onclick = nextWord

    document.getElementById("know").onclick = () => {

      total++
      correct++

      updateStats()

      nextWord()

    }

    document.getElementById("dontknow").onclick = () => {

      reviewList.push(words[index])

      saveReview()

      total++

      updateStats()

      nextWord()

    }

    document.getElementById("review").onclick = () => {

      if (reviewList.length === 0) {

        alert("復習単語はありません")
        return

      }

      words = reviewList
      index = 0

      showWord()

    }

    document.getElementById("speakWord").onclick = () => {

      speak(words[index].word)

    }

    document.getElementById("speakExample").onclick = () => {

      speak(words[index].example)

    }

function speak(text){

  speechSynthesis.cancel()

  const msg = new SpeechSynthesisUtterance(text)

  const voices = speechSynthesis.getVoices()

  const voice =
    voices.find(v => v.name.includes("Google US English")) ||
    voices.find(v => v.lang === "en-US") ||
    voices.find(v => v.lang === "en-GB")

  if(voice){
    msg.voice = voice
  }

  msg.rate = 1.25
  msg.pitch = 0.95

  speechSynthesis.speak(msg)

}

    function updateStats() {

      const rate = total === 0 ? 0 : Math.round(correct / total * 100)

      document.getElementById("total").textContent = total
      document.getElementById("correct").textContent = correct
      document.getElementById("rate").textContent = rate + "%"

      localStorage.setItem("stats", JSON.stringify({
        total,
        correct
      }))

    }

    function loadStats() {

      const data = localStorage.getItem("stats")

      if (data) {

        const s = JSON.parse(data)

        total = s.total
        correct = s.correct

        updateStats()

      }

    }

    function saveReview() {

      localStorage.setItem("reviewList", JSON.stringify(reviewList))

    }

    function loadReview() {

      const data = localStorage.getItem("reviewList")

      if (data) {

        reviewList = JSON.parse(data)

      }

    }

    loadCSV()

  </script>
