<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Study Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-gray-100">

<header class="bg-blue-600 text-white text-center p-4 text-xl font-bold">
Study Dashboard（API版）
</header>

<div class="max-w-6xl mx-auto p-6 grid gap-6 md:grid-cols-2">

<!-- 円グラフ -->
<div class="bg-white p-4 rounded-xl shadow">
<h2 class="font-bold mb-2">学習割合</h2>
<canvas id="pieChart"></canvas>
</div>

<!-- 週グラフ -->
<div class="bg-white p-4 rounded-xl shadow">
<h2 class="font-bold mb-2">週ごとの学習時間</h2>
<canvas id="barChart"></canvas>
</div>

<!-- テーブル -->
<div class="bg-white p-4 rounded-xl shadow md:col-span-2">
<h2 class="font-bold mb-2">学習履歴</h2>
<table class="w-full text-sm">
<thead>
<tr class="border-b">
<th>日付</th>
<th>科目</th>
<th class="text-right">分</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>

// ★ あなたのURL
const API_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrRa6KZiSrnh9rN_hZVV4JODAFp4pxJfV0MTmvMKwXPLVO0gqNFreUK31xxpXF7_9ojrc_bi3t9WnyVbV_Xbb-oDXvAFnvwewfVN5dl8HjalBVxaJwxcD7e-D2UJDNzAX4o_rb-1I8cdNfUq8F3NvWpZ__DsNxLZYgusOV449QCfqG1lxjZ_3iA1NUMli5-aU4vL7BJK3VgL4v65RE4ZOog48aPVTFC6BlIaYJpJoDmly2TxWx3T4jiRjllXt7aN5xatRi6FH3AilIx9dHTcJGO6dmUuaA&lib=MiePSVr3D_eqAovTNfVeuDDA3Wcg5FMSu"

// ===== 正規化 =====
function normalize(subject){

const map = {
"英語":"reading",
"英会話":"speaking",
"英作文":"writing",
"ライティング":"writing",
"grammer":"grammar",
"reading":"reading",
"vocaburary":"vocabulary",
"listening":"listening",
"speaking":"speaking"
}

return map[subject] || subject
}

// ===== メイン処理 =====
async function loadData(){

const res = await fetch(API_URL)
const data = await res.json()

// ===== 円グラフ =====
const totals = {}

data.forEach(d=>{
const key = normalize(d.subject)
totals[key] = (totals[key] || 0) + d.minutes
})

new Chart(document.getElementById("pieChart"),{
type:"pie",
data:{
labels:Object.keys(totals),
datasets:[{data:Object.values(totals)}]
}
})

// ===== 週グラフ =====
const weekly = {}

data.forEach(d=>{
const date = new Date(d.date)
const week = date.getFullYear()+"-W"+Math.ceil(date.getDate()/7)
weekly[week] = (weekly[week] || 0) + d.minutes
})

new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:Object.keys(weekly),
datasets:[{
label:"minutes",
data:Object.values(weekly)
}]
}
})

// ===== テーブル =====
const tbody = document.getElementById("tableBody")

data.reverse().forEach(d=>{

const tr = document.createElement("tr")
tr.className="border-b"

tr.innerHTML = `
<td>${d.date.split("T")[0]}</td>
<td>${d.subject}</td>
<td class="text-right">${d.minutes}</td>
`

tbody.appendChild(tr)

})

}

loadData()

</script>

</body>
</html>
